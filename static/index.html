<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reco — 재질 분석</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app">
    <section class="camera-panel">
      <h1>분리수거 재질 인식</h1>
      <div class="video-wrap">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="overlay"></canvas>
      </div>
      <p id="status" class="status">카메라 시작 중…</p>
      <div class="actions">
        <button id="btnStart" type="button">카메라 시작</button>
        <button id="btnStop" type="button" disabled>정지</button>
      </div>
    </section>

    <section class="chart-panel">
      <div class="chart-card" id="chartCard">
        <h2 class="chart-title">재질 분석</h2>
        <div class="chart-body">
          <canvas id="donut" width="320" height="280"></canvas>
          <ul class="legend" id="legend"></ul>
        </div>
        <p id="primaryLabel" class="primary-label">쓰레기 종류가 여기 표시됩니다</p>
        <img id="capturePreview" class="capture-preview hidden" alt="캡처" />
      </div>
    </section>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
